# deploy-servers.conf — Server inventory for deploy.sh
# Format:
#   Group header:  @GROUP_NAME|ICON
#   Server line:   PROFILE|USER|IPS|DESCRIPTION|COMMAND|SSH_TIMEOUT
#
# Placeholders in COMMAND:
#   {DIR}      — dotfiles directory on remote
#   {PROFILE}  — profile name from the first field
#
# IPs may be comma-separated (first reachable one wins)
# Lines starting with # are comments; blank lines are ignored

