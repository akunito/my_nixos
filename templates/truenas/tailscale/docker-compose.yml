# Tailscale - TrueNAS Docker
# Subnet router for Headscale mesh VPN
# Advertises 192.168.8.0/24 (LAN) and 192.168.20.0/24 (VLAN 100)
#
# State is bind-mounted to ssdpool so it persists across container
# recreation and TrueNAS reboots. This prevents duplicate Headscale
# node registrations.

services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: truenas
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./state:/var/lib/tailscale
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--login-server=https://headscale.akunito.com --advertise-routes=192.168.8.0/24,192.168.20.0/24 --accept-routes
      - TS_STATE_DIR=/var/lib/tailscale
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
