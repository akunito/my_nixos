# VPN Media stack - rootful Docker (gluetun needs NET_ADMIN + /dev/net/tun)
# qBittorrent uses gluetun's network namespace for VPN-only traffic.
# gluetun.env configures VPN provider, protocol, and firewall (FIREWALL_VPN_INPUT_PORTS).
# PUID/PGID = 100999 to match the rootless docker namespace (akunito subuid 100000 + 999),
# so files under /mnt/ssdpool/media/downloads stay writable by both this rootful qBittorrent
# and the rootless *arr containers that hardlink/move them on import.

services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    hostname: qbittorrent
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8085:8085
      - 6881:6881
      - 6881:6881/udp
    volumes:
      - ${DATA_PATH}/gluetun:/gluetun
    environment:
      - TZ=Europe/Warsaw
      - UPDATER_PERIOD=24h
    env_file:
      - /mnt/ssdpool/docker/compose/env/media/gluetun.env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8085"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 2m
    deploy:
      resources:
        limits:
          memory: 256M

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    depends_on:
      - gluetun
    network_mode: "service:gluetun"
    environment:
      - PUID=100999
      - PGID=100999
      - TZ=Europe/Warsaw
      - WEBUI_PORT=8085
    volumes:
      - ${DATA_PATH}/mediarr/qbittorrent:/config
      - ${MEDIA_PATH}/downloads:/data/downloads
      # extpool removed — USB NVMe (RTL9210) can't handle sustained torrent writes.
      # Games download to /data/downloads/games (ssdpool), then move to extpool via
      # ~/scripts/move-games-to-extpool.sh after download completes.
      # qBittorrent.conf tuning (in /config volume):
      #   DiskIOWriteMode=EnableOSCache — required for smooth speeds on RAIDZ1
      #     (DisableOSCache causes write-stall cycles: ~5MB/s bursts then <100KB/s)
      #   MaxActiveDownloads=40 (default was 20)
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "3"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://127.0.0.1:8085 || exit 1"
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 3G
