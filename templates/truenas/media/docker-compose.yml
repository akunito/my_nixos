# Media stack - TrueNAS Docker (ROOTLESS daemon)
# Unified /data mount for hardlinks (TRaSH Guides best practice)
# All services accessible via host ports on 192.168.20.200
#
# gluetun + qbittorrent moved to vpn-media/ (root Docker — NET_ADMIN required)

services:
  jellyfin:
    container_name: jellyfin
    image: jellyfin/jellyfin
    user: 1000:1000
    environment:
      - JELLYFIN_PublishedServerUrl=http://jellyfin.akunito.com
      - JELLYFIN_CACHE_DIR=/var/cache/jellyfin
      - JELLYFIN_CONFIG_DIR=/etc/jellyfin
      - JELLYFIN_DATA_DIR=/var/lib/jellyfin
      - JELLYFIN_LOG_DIR=/var/log/jellyfin
      - TZ=Europe/Warsaw
    volumes:
      - ${DATA_PATH}/jellyfin/etc:/etc/jellyfin
      - ${DATA_PATH}/jellyfin/var-cache:/var/cache/jellyfin
      - ${DATA_PATH}/jellyfin/var-lib:/var/lib/jellyfin
      - ${DATA_PATH}/jellyfin/var-log:/var/log/jellyfin
      - ${MEDIA_PATH}:/data:ro
    group_add:
      - "104"
      - "44"
    ports:
      - "8096:8096"
    devices:
      - /dev/dri/:/dev/dri/
    restart: unless-stopped
    init: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8096/health || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    hostname: bazarr
    ports:
      - "6767:6767"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Warsaw
    volumes:
      - ${DATA_PATH}/mediarr/bazarr:/config
      - ${MEDIA_PATH}:/data
    restart: unless-stopped
    depends_on:
      - sonarr
      - radarr
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE]
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "3"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://127.0.0.1:6767 || exit 1"
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    hostname: jellyseerr
    ports:
      - "5055:5055"
    user: 1000:1000
    environment:
      - TZ=Europe/Warsaw
    volumes:
      - ${DATA_PATH}/mediarr/jellyseerr:/app/config
    restart: unless-stopped
    depends_on:
      - sonarr
      - radarr
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5055 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    hostname: prowlarr
    ports:
      - "9696:9696"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Warsaw
    volumes:
      - ${DATA_PATH}/mediarr/prowlarr:/config
    restart: unless-stopped
    depends_on:
      - solvearr
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE]
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "3"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://127.0.0.1:9696 || exit 1"
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  solvearr:
    image: nabilak/solvearr:latest
    container_name: solvearr
    hostname: solvearr
    environment:
      - TZ=Europe/Warsaw
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8191 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    hostname: radarr
    ports:
      - "7878:7878"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Warsaw
    volumes:
      - ${DATA_PATH}/mediarr/radarr:/config
      - ${MEDIA_PATH}:/data
    restart: unless-stopped
    depends_on:
      - prowlarr
      - jellyfin
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE]
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "3"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://127.0.0.1:7878 || exit 1"
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    hostname: sonarr
    ports:
      - "8989:8989"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Warsaw
    volumes:
      - ${DATA_PATH}/mediarr/sonarr:/config
      - ${MEDIA_PATH}:/data
    depends_on:
      - prowlarr
      - jellyfin
    restart: unless-stopped
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE]
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "3"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://127.0.0.1:8989 || exit 1"
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
