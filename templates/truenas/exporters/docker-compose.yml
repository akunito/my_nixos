# Application Metrics Exporters - TrueNAS Docker (ROOTLESS daemon)
# Exports metrics from *arr stack for Prometheus scraping
# Metrics available at: http://192.168.20.200:9707-9710/metrics

networks:
  mediarr-net:
    external: true
    name: media_default

services:
  exportarr-sonarr:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-sonarr
    command: ["sonarr"]
    environment:
      - PORT=9707
      - URL=http://sonarr:8989
      - APIKEY=${SONARR_API_KEY}
      - ENABLE_ADDITIONAL_METRICS=true
      - ENABLE_UNKNOWN_QUEUE_ITEMS=true
    ports:
      - "9707:9707"
    networks:
      - mediarr-net
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "2"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9707/healthz || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  exportarr-radarr:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-radarr
    command: ["radarr"]
    environment:
      - PORT=9708
      - URL=http://radarr:7878
