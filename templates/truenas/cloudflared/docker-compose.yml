# =============================================================================
# Cloudflared — ROOTLESS Docker ONLY. NEVER run with `sudo docker compose up`.
# =============================================================================
# Running this stack in system Docker creates a duplicate cloudflared instance
# on the same Cloudflare tunnel token (618b9988-…), which Cloudflare will
# load-balance across — wasting resources and making logs/debugging confusing.
# nas-docker-startup.sh treats this as a ROOTLESS project; do not start it any
# other way. The script also auto-removes any misplaced system-Docker copy on
# next run (cleanup_misplaced_projects).
#
# Outbound-only tunnel — no host network mode needed.

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      TZ: Europe/Warsaw
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    # Note: cloudflared image is distroless (no shell, no wget/curl)
    # Health monitoring via Docker restart policy + cadvisor container status
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 256M
