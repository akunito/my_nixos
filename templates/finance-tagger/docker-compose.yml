services:
  finance-tagger:
    build: .
    container_name: finance-tagger
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:8190:8190"
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    volumes:
      - ${HOME}/.openclaw/finance-data:/data
    env_file:
      - .env
    environment:
      - DB_PATH=/data/vaultkeeper.db
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8190/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
