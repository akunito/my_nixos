<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
  <h3 style="color:var(--accent);font-size:1rem;">Matching rules for: {{ tx['description'][:80] }}</h3>
  <button class="btn btn-sm btn-danger" onclick="document.getElementById('matching-rules-panel').innerHTML=''">Close</button>
</div>
{% if matching %}
<table>
<thead>
<tr>
  <th>ID</th>
  <th>Pri</th>
  <th>Field</th>
  <th>Type</th>
  <th>Pattern</th>
  <th>&#8594; tx_type</th>
  <th>&#8594; group</th>
  <th>&#8594; category</th>
  <th>Note</th>
  <th>Actions</th>
</tr>
</thead>
<tbody>
{% for rule in matching %}
{% set form_prefix = "mr-edit" %}
{% include '_rule_row.html' %}
{% endfor %}
</tbody>
</table>
{% else %}
<p style="color:var(--fg2)">No rules match this transaction.</p>
{% endif %}
