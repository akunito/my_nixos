<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — Finance Tagger</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --bg3: #0f3460;
  --fg: #e0e0e0;
  --fg2: #a0a0b0;
  --accent: #00b4d8;
  --danger: #e74c3c;
  --border: #2a2a4a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--fg); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 2rem; width: 100%; max-width: 360px; }
.login-box h1 { color: var(--accent); font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 0.85rem; color: var(--fg2); margin-bottom: 0.3rem; }
.field input { width: 100%; padding: 0.5rem 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--fg); font-size: 0.95rem; }
.field input:focus { outline: none; border-color: var(--accent); }
.btn { width: 100%; padding: 0.6rem; background: var(--accent); color: #fff; border: none; border-radius: 4px; font-size: 0.95rem; cursor: pointer; }
.btn:hover { opacity: 0.85; }
.error { color: var(--danger); font-size: 0.85rem; margin-bottom: 1rem; text-align: center; }
</style>
</head>
<body>
<div class="login-box">
  <h1>Finance Tagger</h1>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autofocus required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
    </div>
    <button type="submit" class="btn">Sign In</button>
  </form>
</div>
</body>
</html>
