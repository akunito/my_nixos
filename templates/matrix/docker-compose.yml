# Matrix Synapse + Element Web Docker Compose
# Deploy to: ~/.homelab/matrix/docker-compose.yml on VPS_PROD
#
# Prerequisites:
# 1. Generate signing key: docker run --rm -v ./data:/data matrixdotorg/synapse:v1.148.0 generate
# 2. Create .env file with credentials (see .env.template)
# 3. Ensure PostgreSQL database 'matrix' exists on host
#
# SEC-DOCKER-HARD-001: Hardened — pinned images, security_opt, cap_drop, resource limits,
# localhost-bound ports, logging limits, read_only where possible.

services:
  # Local Redis for Synapse caching (more resilient than remote)
  redis:
    image: redis:7-alpine
    container_name: matrix-redis
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    networks:
      - matrix-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M

  synapse:
    image: matrixdotorg/synapse:v1.148.0
    container_name: synapse
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    extra_hosts:
      - "host.docker.internal:10.0.2.2"  # slirp4netns gateway (rootless Docker host access)
    volumes:
      - ./data:/data
      - ./config/homeserver.yaml:/data/homeserver.yaml:ro
      - ./config/log.config:/data/log.config:ro
    environment:
      - SYNAPSE_SERVER_NAME=${SYNAPSE_SERVER_NAME:-matrix.local.akunito.com}
      - SYNAPSE_REPORT_STATS=${SYNAPSE_REPORT_STATS:-no}
      - TZ=Europe/Madrid
    ports:
      - "127.0.0.1:8008:8008"   # Client-Server API
      - "127.0.0.1:9000:9000"   # Prometheus metrics
    networks:
      - matrix-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/_matrix/client/versions"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M

  element-web:
    image: vectorim/element-web:v1.12.11
    container_name: element-web
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN          # nginx needs to chown pid/cache files
      - NET_BIND_SERVICE  # nginx binds port 80 inside container
    volumes:
      - ./element-config/config.json:/app/config.json:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /var/run:size=16m
      - /var/cache/nginx:size=64m
    environment:
      - TZ=Europe/Madrid
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - matrix-net
    depends_on:
      synapse:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 32M

networks:
  matrix-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

volumes:
  redis-data:
    driver: local
